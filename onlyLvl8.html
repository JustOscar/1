<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reading Game</title>
    <style>
        /* === UI/UX Constraints & iPad Optimizations === */
        * {
            box-sizing: border-box;
            /* Disable text selection and tap highlights so it feels like a native app */
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* Disable double-tap-to-zoom */
            touch-action: manipulation;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f9f9f9; /* Soft off-white to prevent eye strain */
            color: #222222; /* Charcoal text */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Standard hidden class for state management */
        .hidden {
            display: none !important;
        }

        /* === Layout Containers === */
        .screen {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 900px; /* Widened to accommodate dual column spacing comfortably */
            padding: 20px;
            position: relative;
        }

        #home-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow-y: auto;
        }

        /* Responsive Flex Wrapper for Layout Columns */
        .menu-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 48px; /* Distinct visual partition separating column profiles */
            width: 100%;
        }

        /* Structural Design Columns */
        .menu-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 380px;
        }

        /* Menu Rows for Buttons and Scores */
        .level-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
            width: 100%;
        }

        #game-screen {
            justify-content: space-between;
        }

        /* === Score Displays & Navigation Buttons === */
        .level-score {
            font-size: 2rem;
            font-weight: bold;
            color: #4CAF50;
            width: 90px;
            text-align: left;
            user-select: none;
        }

        #reset-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #ffffff; 
            color: #222222;
            border: 2px solid #222222;
            padding: 10px 16px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #reset-btn:active {
            background-color: #e0e0e0;
        }

        /* Advanced Mode Toggle - Exactly matching reset button style specs */
        #expand-btn {
            position: absolute;
            top: 75px; 
            right: 20px;
            background-color: #ffffff;
            color: #222222;
            border: 2px solid #222222;
            padding: 10px 16px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 76px; /* Strict horizontal blueprint match */
            text-align: center;
        }

        #expand-btn:active {
            background-color: #e0e0e0;
        }

        #home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #555555;
            color: white;
            border: 2px solid #222222;
            padding: 10px 20px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #home-btn:active {
            background-color: #333333;
        }

        /* === Top: Progress Indicator === */
        #progress-indicator {
            font-size: 1.5rem;
            text-align: center;
            padding: 20px 0;
            color: #555;
            font-weight: normal;
        }

        /* === Middle: Listen Button & Display Text === */
        #middle-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px; 
        }

        .listen-btn {
            background: #ffffff;
            border: 3px solid #222222;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .listen-btn:active {
            background: #eeeeee;
        }

        .listen-btn svg {
            width: 50px;
            height: 50px;
            fill: #222222;
        }

        #display-text {
            font-size: 4rem; /* Huge text for readability */
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
            width: 100%;
        }

        /* === Bottom: Option Buttons === */
        #options-area {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 44px; /* Strict 44px minimum spacing for iPad targets */
            width: 100%;
        }

        .action-btn {
            font-size: 2.5rem;
            font-weight: bold;
            padding: 24px 48px;
            min-width: 180px;
            min-height: 88px; /* Massive tap target */
            border: 3px solid #222222;
            background-color: #ffffff;
            color: #222222;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .action-btn:active {
            background-color: #e0e0e0;
            transform: translateY(2px);
        }

        .level-btn:disabled {
            background-color: #dddddd;
            color: #888888;
            border-color: #aaaaaa;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* === Custom Keyboard Input Layout for Level 7 === */
        .keyboard-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            padding: 10px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            width: 100%;
        }

        .key-btn {
            font-size: 1.8rem;
            font-weight: bold;
            height: 64px;
            flex: 1;
            min-width: 32px;
            border: 3px solid #222222;
            background-color: #ffffff;
            color: #222222;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: lowercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            touch-action: manipulation;
        }

        .key-btn:active {
            background-color: #e0e0e0;
            transform: translateY(2px);
        }

        .key-btn.wide-key {
            flex: 1.6;
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        /* === iPad Safe Area Portrait Padding === */
        @media (orientation: portrait) {
            #options-area {
                padding-bottom: max(60px, env(safe-area-inset-bottom, 60px));
            }
        }

        /* === Landscape Layout Optimizations === */
        @media (orientation: landscape) {
            .screen {
                padding: 10px 20px;
            }

            .listen-btn {
                width: 72px;
                height: 72px;
            }
            
            .listen-btn svg {
                width: 36px;
                height: 36px;
            }

            #middle-area {
                gap: 20px;
            }

            #display-text {
                font-size: 3rem;
            }

            #progress-indicator {
                font-size: 1.2rem;
                padding: 8px 0;
                padding-left: 90px;
            }

            .action-btn {
                font-size: 2.2rem;
                padding: 18px 40px;
                min-height: 72px;
            }

            #options-area {
                gap: 28px;
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }

            .key-btn {
                height: 48px;
                font-size: 1.4rem;
                border-radius: 8px;
                border-width: 2px;
            }
            .key-btn.wide-key {
                font-size: 1.1rem;
            }
            .keyboard-container {
                gap: 5px;
                padding: 2px;
            }
            .keyboard-row {
                gap: 4px;
            }
        }
    </style>
</head>
<body>

    <div id="home-screen" class="screen">
        <button id="reset-btn">Reset</button>
        <button id="expand-btn">+</button>
        
        <h1 style="font-size: 4rem; margin-bottom: 40px; margin-top: 20px;">Reading Game</h1>
        
        <div class="menu-container">
            
            <div class="menu-column" id="standard-column">
                <div class="level-row">
                    <button class="action-btn level-btn" data-level="0">Level 1</button>
                    <span class="level-score" id="score-0"></span>
                </div>
                <div class="level-row">
                    <button class="action-btn level-btn" data-level="1">Level 2</button>
                    <span class="level-score" id="score-1"></span>
                </div>
                <div class="level-row">
                    <button class="action-btn level-btn" data-level="2">Level 3</button>
                    <span class="level-score" id="score-2"></span>
                </div>
                <div class="level-row">
                    <button class="action-btn level-btn" data-level="3">Level 4</button>
                    <span class="level-score" id="score-3"></span>
                </div>
            </div>

            <div class="menu-column hidden" id="advanced-column">
                <div class="level-row">
                    <button class="action-btn level-btn" data-level="4">Level 5</button>
                    <span class="level-score" id="score-4"></span>
                </div>
                <div class="level-row">
                    <button class="action-btn level-btn" data-level="5">Level 6</button>
                    <span class="level-score" id="score-5"></span>
                </div>
                <div class="level-row">
                    <button class="action-btn level-btn" data-level="6">Level 7</button>
                    <span class="level-score" id="score-6"></span>
                </div>
                <div class="level-row">
                    <button class="action-btn level-btn" data-level="7">Level 8</button>
                    <span class="level-score" id="score-7"></span>
                </div>
            </div>

        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <button id="home-btn">Home</button>
        <div id="progress-indicator">Level 1 - Question 1 / 10</div>
        
        <div id="middle-area">
            <button class="listen-btn" id="listen-btn" aria-label="Listen">
                <svg viewBox="0 0 24 24">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
            </button>
            <div id="display-text">The cat is ____</div>
        </div>

        <div id="options-area"></div>
    </div>

    <script>
        // === GAME DATA ===
        const gameData = [
            {
                levelName: "Level 1",
                questions: [
                    { display: "Sleep on the ____", audio: "Sleep on the bed. Find the word bed.", correct: "bed", choices: ["bed", "big"] }
                ]
            },
            {
                levelName: "Level 2",
                questions: [
                    { display: "____", audio: "Find the word: drawing.", correct: "drawing", choices: ["drawing", "driving"] }
                ]
            },
            {
                levelName: "Level 3",
                questions: [
                    { display: "Color in your new ____", audio: "Color in your new drawing. Find the word drawing.", correct: "drawing", choices: ["drawing", "driving"] }
                ]
            },
            {
                levelName: "Level 4",
                questions: [
                    { display: "He looks just like his ____ brother", audio: "He looks just like his twin brother. Find the word twin.", correct: "twin", choices: ["twice", "twist", "twin"] }
                ]
            },
            {
                levelName: "Level 5",
                questions: [
                    // --- Digraphs (sh, ch, th, wh, ck) ---
                    { display: "The bright ____ illuminates the bedroom.", audio: "The bright lamp illuminates the bedroom. Find the word lamp.", correct: "lamp", choices: ["lamp", "camp", "ramp", "limp"] }
                ]
            },
            {
                levelName: "Level 6",
                questions: [
                    // --- 50-Question Phonics Spelling Integration Block ---
                    { display: "The dog chewed on a white ____.", audio: "Spell the word bone.", correct: "bone", choices: ["b", "o", "n", "e", "t", "m"] }
                ]
            },
            {
                levelName: "Level 7",
                // ALL 100 UN-TRUNCATED CHALLENGES FOR KEYBOARD ENTRY MODE
                questions: [
                    { display: "Always be very ____", audio: "Always be very kind. Type the word kind.", correct: "kind" }
                ]
            },
            {
                levelName: "Level 8",
                questions: [
                    {
                        story: "The little blue bird found a shiny golden key under a big green leaf. She flew to the old oak tree and opened a tiny wooden box. Inside, she found a bright red strawberry!",
                        question: "What did the little blue bird find inside the box?",
                        choices: ["A shiny key", "A red strawberry", "A green leaf"],
                        correct: "A red strawberry",
                        audio: "Read the story. What did the little blue bird find inside the box?"
                    },
                    {
                        story: "Max the puppy loved the sunny beach. He dug a deep hole in the yellow sand and found a striped ball. He pushed it with his nose all the way into the blue ocean water.",
                        question: "Where did Max push the striped ball?",
                        choices: ["Into a deep hole", "Into the blue ocean water", "Under the yellow sand"],
                        correct: "Into the blue ocean water",
                        audio: "Read the story. Where did Max push the striped ball?"
                    },
                    {
                        story: "Leo the astronaut put on his silver helmet and climbed into the rocket. The engines made a loud roar! He flew past the glowing moon and waved at a friendly green alien.",
                        question: "Who did Leo wave at as he flew past the moon?",
                        choices: ["A friendly green alien", "A silver rocket", "A shining star"],
                        correct: "A friendly green alien",
                        audio: "Read the story. Who did Leo wave at as he flew past the moon?"
                    },
                    {
                        story: "The red car drove up the high hill. The wind was blowing hard and the trees were shaking. At the top of the hill, the driver saw a beautiful rainbow in the sky.",
                        question: "What did the driver see at the top of the hill?",
                        choices: ["A fast rocket", "A beautiful rainbow", "A big green leaf"],
                        correct: "A beautiful rainbow",
                        audio: "Read the story. What did the driver see at the top of the hill?"
                    },
                    {
                        story: "Mia went to the backyard garden with her grandpa. They found a family of tiny brown snails hiding under a flower pot. Mia gave them a small drop of fresh water.",
                        question: "What did Mia give to the tiny brown snails?",
                        choices: ["A small drop of water", "A bright red strawberry", "A yellow striped ball"],
                        correct: "A small drop of water",
                        audio: "Read the story. What did Mia give to the tiny brown snails?"
                    }
                ]
            }
        ];

        // === STATE MANAGEMENT ===
        let currentLevelIndex = 0;
        let currentQuestionIndex = 0;
        let shuffledQuestions = []; 
        let isWaiting = false; 
        
        let currentLevelScore = 0;
        let isFirstTryForQuestion = true;
        let currentSpellingIndex = 0; // Tracks sequence parsing within spelling/guided layout engines
        let strictTypedWord = "";     // Tracks characters accumulated within strict typing engine mode

        // Defensive Hydration Logic
        let completedScores = JSON.parse(localStorage.getItem('readingGameScores')) || {};
        for (let i = 0; i < 8; i++) {
            if (completedScores[i] === undefined) {
                completedScores[i] = null;
            }
        }

        let advancedUnlocked = localStorage.getItem('advancedModeUnlocked') === 'true';

        // === DOM ELEMENTS ===
        const homeScreen = document.getElementById('home-screen');
        const gameScreen = document.getElementById('game-screen');
        const progressIndicator = document.getElementById('progress-indicator');
        const displayText = document.getElementById('display-text');
        const listenBtn = document.getElementById('listen-btn');
        const optionsArea = document.getElementById('options-area');
        const homeBtn = document.getElementById('home-btn');
        const resetBtn = document.getElementById('reset-btn');
        const expandBtn = document.getElementById('expand-btn');
        const advancedColumn = document.getElementById('advanced-column');

        // === SHUFFLE HELPER ===
        function shuffleArray(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        // === UI UPDATER FOR HOME MENU ===
        function updateHomeMenu() {
            for (let i = 0; i < 8; i++) {
                const scoreSpan = document.getElementById(`score-${i}`);
                const btn = document.querySelector(`.level-btn[data-level="${i}"]`);
                
                if (!btn || !scoreSpan) continue;

                const savedScore = completedScores[i];

                if (savedScore !== null) {
                    scoreSpan.textContent = `${savedScore}/10`;
                    if (i < 4) {
                        btn.disabled = true; 
                    } else {
                        btn.disabled = false;
                    }
                } else {
                    scoreSpan.textContent = '';
                    btn.disabled = false; 
                }
            }

            // Clean toggle parsing applied natively directly to the right layout column
            if (advancedUnlocked) {
                advancedColumn.classList.remove('hidden');
            } else {
                advancedColumn.classList.add('hidden');
            }
            expandBtn.innerText = advancedUnlocked ? "−" : "+";
        }

        // === STABLE AUDIO ENGINE FOR MOBILE IOS ===
        let _voice = null;
        let activeUtterance = null; // Global instance placeholder to block iOS Garbage Collection dropping callbacks mid-speech

        function _pickVoice() {
            const list = window.speechSynthesis.getVoices();
            if (!list.length) return; 

            _voice =
                list.find(v => v.name === 'Samantha')                        
                || list.find(v => v.name === 'Karen')                        
                || list.find(v => v.lang === 'en-US' && v.localService)     
                || list.find(v => v.lang.startsWith('en') && v.localService)
                || list.find(v => v.lang.startsWith('en'))                   
                || list[0];                                                   
        }

        _pickVoice();
        window.speechSynthesis.onvoiceschanged = _pickVoice;

        function speak(text, callback) {
            if (window.speechSynthesis.paused) {
                window.speechSynthesis.resume();
            }
            window.speechSynthesis.cancel();

            setTimeout(() => {
                activeUtterance = new SpeechSynthesisUtterance(text);
                activeUtterance.lang   = 'en-US';
                activeUtterance.rate   = 0.70; 
                activeUtterance.pitch  = 1.0;
                activeUtterance.volume = 1.0;

                if (_voice) activeUtterance.voice = _voice;

                if (callback) {
                    activeUtterance.onend = () => {
                        callback();
                    };
                }

                window.speechSynthesis.speak(activeUtterance);
            }, 50);
        }

        setInterval(() => window.speechSynthesis.paused && window.speechSynthesis.resume(), 14000);

        // === APP NAVIGATION ACTIONS ===
        document.querySelectorAll('.level-btn').forEach(button => {
            button.addEventListener('click', (e) => {
                currentLevelIndex = parseInt(e.target.getAttribute('data-level'));
                currentQuestionIndex = 0; 
                currentLevelScore = 0; 
                
                let allQuestions = [...gameData[currentLevelIndex].questions];
                shuffledQuestions = shuffleArray(allQuestions).slice(0, Math.min(10, allQuestions.length));

                homeScreen.classList.add('hidden');
                gameScreen.classList.remove('hidden');
                
                loadQuestion();
            });
        });

        expandBtn.addEventListener('click', () => {
            advancedUnlocked = !advancedUnlocked;
            localStorage.setItem('advancedModeUnlocked', advancedUnlocked ? 'true' : 'false');
            updateHomeMenu();
            speak(advancedUnlocked ? "Advanced levels revealed." : "Advanced levels hidden.");
        });

        homeBtn.addEventListener('click', () => {
            window.speechSynthesis.cancel();
            gameScreen.classList.add('hidden');
            homeScreen.classList.remove('hidden');
        });

        resetBtn.addEventListener('click', () => {
            if (!confirm("Erase all scores and start over?")) return;
            completedScores = { 0: null, 1: null, 2: null, 3: null, 4: null, 5: null, 6: null, 7: null };
            localStorage.removeItem('readingGameScores');
            updateHomeMenu();
            speak("Scores reset.");
        });

        listenBtn.addEventListener('click', () => {
            const currentQ = shuffledQuestions[currentQuestionIndex];
            speak(currentQ.audio);
        });

        // === CORE GAME ENGINE ===
        function loadQuestion() {
            isWaiting = false; 
            isFirstTryForQuestion = true; 
            const currentLevel = gameData[currentLevelIndex];
            const currentQ = shuffledQuestions[currentQuestionIndex];

            progressIndicator.innerText = `${currentLevel.levelName} - Question ${currentQuestionIndex + 1} / ${shuffledQuestions.length}`;

            // Reset dynamic innerHTML presentation parameters
            displayText.innerHTML = '';
            optionsArea.innerHTML = '';

            if (currentLevelIndex === 6) {
                // === BRANCH EXECUTION: LEVEL 7 KEYBOARD INPUT TYPING ENGINE ===
                currentSpellingIndex = 0;
                strictTypedWord = "";
                renderKeyboardDisplay();
                speak(currentQ.audio);

                optionsArea.innerHTML = '';
                const keyboardContainer = document.createElement('div');
                keyboardContainer.className = 'keyboard-container';

                const rows = [
                    ['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'],
                    ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'],
                    ['DELETE', 'z', 'x', 'c', 'v', 'b', 'n', 'm', 'ENTER']
                ];

                rows.forEach(rowKeys => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'keyboard-row';
                    rowKeys.forEach(key => {
                        const btn = document.createElement('button');
                        btn.className = 'key-btn';
                        if (key === 'DELETE' || key === 'ENTER') {
                            btn.classList.add('wide-key');
                            btn.innerText = key === 'DELETE' ? '⌫' : '✔';
                            if (currentQuestionIndex < 5) {
                                btn.style.opacity = '0.25'; // Fade non-functional keys inside Guided Mode limits
                            }
                        } else {
                            btn.innerText = key;
                        }
                        btn.addEventListener('click', () => handleKeyboardKey(key));
                        rowDiv.appendChild(btn);
                    });
                    keyboardContainer.appendChild(rowDiv);
                });
                optionsArea.appendChild(keyboardContainer);

            } else if (currentLevelIndex === 5) {
                // === BRANCH EXECUTION: LEVEL 6 PHONICS SPELLING ENGINE ===
                currentSpellingIndex = 0;
                renderSpellingDisplay();
                speak(currentQ.audio);

                const shuffledChoices = [...currentQ.choices].sort(() => Math.random() - 0.5);
                shuffledChoices.forEach(letter => {
                    const btn = document.createElement('button');
                    btn.className = 'action-btn';
                    btn.innerText = letter;
                    btn.style.minWidth = '100px'; // Optimization scaling for single character layouts
                    btn.style.textTransform = 'lowercase';
                    btn.addEventListener('click', () => handleLetterTap(letter, btn));
                    optionsArea.appendChild(btn);
                });

            } else if (currentLevelIndex === 7) {
                // === BRANCH EXECUTION: LEVEL 8 SHORT STORY COMPREHENSION ENGINE ===
                speak(currentQ.audio);

                displayText.innerHTML = `
                    <div style="font-size: 1.8rem; font-weight: 500; line-height: 1.7; color: #222222; text-align: left; max-width: 720px; margin: 0 auto; width: 100%; user-select: none;">${currentQ.story}</div>
                    <div style="border-bottom: 2px dashed #dddddd; margin: 20px auto; max-width: 720px; width: 100%;"></div>
                    <div style="font-size: 1.5rem; font-weight: bold; line-height: 1.4; color: #555555; text-align: left; max-width: 720px; margin: 0 auto; width: 100%;">${currentQ.question}</div>
                `;

                const shuffledChoices = [...currentQ.choices].sort(() => Math.random() - 0.5);
                shuffledChoices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = 'action-btn';
                    btn.innerText = choice;
                    // Scale option tap targets slightly for multi-word story phrase choices
                    btn.style.fontSize = '1.8rem';
                    btn.style.padding = '16px 32px';
                    btn.style.minHeight = '76px';
                    btn.addEventListener('click', () => handleChoice(choice, currentQ.correct));
                    optionsArea.appendChild(btn);
                });

            } else {
                // === STANDARD BRANCH: LEVEL 1-5 WORDS RECOGNITION ENGINE ===
                displayText.innerText = currentQ.display;
                speak(currentQ.audio);

                const shuffledChoices = [...currentQ.choices].sort(() => Math.random() - 0.5);
                shuffledChoices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = 'action-btn';
                    btn.innerText = choice;
                    btn.addEventListener('click', () => handleChoice(choice, currentQ.correct));
                    optionsArea.appendChild(btn);
                });
            }
        }

        // Renders Level 6 Letter Slots Underneath Sentences Safely
        function renderSpellingDisplay() {
            const currentQ = shuffledQuestions[currentQuestionIndex];
            const word = currentQ.correct;
            let visualStr = "";
            for (let i = 0; i < word.length; i++) {
                if (i < currentSpellingIndex) {
                    visualStr += word[i] + " ";
                } else {
                    visualStr += "_ ";
                }
            }
            displayText.innerHTML = `
                <div style="font-size: 2.2rem; font-weight: normal; margin-bottom: 12px; color: #555555;">${currentQ.display}</div>
                <div style="font-size: 4.5rem; font-weight: bold; color: #222222; letter-spacing: 12px; text-transform: lowercase;">${visualStr.trim()}</div>
            `;
        }

        // Renders Level 7 Interactive Sentence and Word Spaces with Submodes
        function renderKeyboardDisplay() {
            const currentQ = shuffledQuestions[currentQuestionIndex];
            const word = currentQ.correct;
            let visualStr = "";
            
            if (currentQuestionIndex < 5) {
                // Guided Mode structural formatting
                for (let i = 0; i < word.length; i++) {
                    if (i < currentSpellingIndex) {
                        visualStr += word[i] + " ";
                    } else {
                        visualStr += "_ ";
                    }
                }
            } else {
                // Strict Mode open buffer formatting
                for (let i = 0; i < word.length; i++) {
                    if (i < strictTypedWord.length) {
                        visualStr += strictTypedWord[i] + " ";
                    } else {
                        visualStr += "_ ";
                    }
                }
            }

            const submodeText = currentQuestionIndex < 5 ? "Guided Mode" : "Strict Mode";
            const submodeColor = currentQuestionIndex < 5 ? "#4CAF50" : "#E53935";

            displayText.innerHTML = `
                <div style="font-size: 1.1rem; font-weight: bold; color: ${submodeColor}; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 2px;">${submodeText}</div>
                <div style="font-size: 2.2rem; font-weight: normal; margin-bottom: 12px; color: #555555;">${currentQ.display}</div>
                <div style="font-size: 4.5rem; font-weight: bold; color: #222222; letter-spacing: 12px; text-transform: lowercase;">${visualStr.trim()}</div>
            `;
        }

        // Logic processing matrix for Level 7 letter sequence inputs
        function handleKeyboardKey(key) {
            if (isWaiting) return;
            const currentQ = shuffledQuestions[currentQuestionIndex];
            const targetWord = currentQ.correct;

            if (currentQuestionIndex < 5) {
                // --- SUBMODE 1: GUIDED MATRIX ---
                if (key === 'DELETE' || key === 'ENTER') return; // Blocks non-typing key functionality natively
                
                const expectedLetter = targetWord[currentSpellingIndex];
                if (key === expectedLetter) {
                    currentSpellingIndex++;
                    speak(key);
                    renderKeyboardDisplay();

                    if (currentSpellingIndex === targetWord.length) {
                        isWaiting = true;
                        if (isFirstTryForQuestion) {
                            currentLevelScore++;
                        }
                        speak("Correct! " + targetWord, advanceGame);
                    }
                } else {
                    isFirstTryForQuestion = false;
                    speak(key); // Acoustic character name feedback on rejected keystroke
                }
            } else {
                // --- SUBMODE 2: STRICT MATRIX ---
                if (key === 'DELETE') {
                    if (strictTypedWord.length > 0) {
                        strictTypedWord = strictTypedWord.slice(0, -1);
                        speak("delete");
                        renderKeyboardDisplay();
                    }
                } else if (key === 'ENTER') {
                    if (strictTypedWord.toLowerCase() === targetWord.toLowerCase()) {
                        isWaiting = true;
                        if (isFirstTryForQuestion) {
                            currentLevelScore++;
                        }
                        speak("Correct! " + targetWord, advanceGame);
                    } else {
                        isFirstTryForQuestion = false;
                        speak("Try again");
                    }
                } else {
                    if (strictTypedWord.length < targetWord.length) {
                        strictTypedWord += key;
                        speak(key);
                        renderKeyboardDisplay();
                    }
                }
            }
        }

        // Logic processing matrix for Level 6 letter sequence taps
        function handleLetterTap(selectedLetter, buttonElement) {
            if (isWaiting) return;
            const currentQ = shuffledQuestions[currentQuestionIndex];
            const targetWord = currentQ.correct;
            const expectedLetter = targetWord[currentSpellingIndex];

            if (selectedLetter === expectedLetter) {
                currentSpellingIndex++;
                speak(selectedLetter);
                
                // Vanish tile node cleanly upon accurate sequencing alignment
                buttonElement.style.visibility = 'hidden';
                renderSpellingDisplay();

                if (currentSpellingIndex === targetWord.length) {
                    isWaiting = true;
                    if (isFirstTryForQuestion) {
                        currentLevelScore++;
                    }
                    speak("Correct! " + targetWord, advanceGame);
                }
            } else {
                isFirstTryForQuestion = false;
                speak(selectedLetter); // Acoustic naming validation on erroneous attempts
            }
        }

        // Standard validation matrix processing for Multi-Choice selections
        function handleChoice(selectedChoice, correctChoice) {
            if (isWaiting) return; 

            if (selectedChoice === correctChoice) {
                isWaiting = true;
                
                if (isFirstTryForQuestion) {
                    currentLevelScore++;
                }

                speak("Correct!", advanceGame);
            } else {
                isFirstTryForQuestion = false; 
                speak(selectedChoice);
            }
        }

        function advanceGame() {
            currentQuestionIndex++;

            if (currentQuestionIndex >= shuffledQuestions.length) { 
                completedScores[currentLevelIndex] = currentLevelScore;
                localStorage.setItem('readingGameScores', JSON.stringify(completedScores));
                
                currentQuestionIndex = 0;
                
                updateHomeMenu();
                gameScreen.classList.add('hidden');
                homeScreen.classList.remove('hidden');
                
                speak("Great job! You finished the level.");
                return;
            }
            
            loadQuestion();
        }

        updateHomeMenu();
    </script>
</body>
</html>
