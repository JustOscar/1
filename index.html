<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reading Game</title>
    <style>
        /* === UI/UX Constraints & iPad Optimizations === */
        * {
            box-sizing: border-box;
            /* Disable text selection and tap highlights so it feels like a native app */
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* Disable double-tap-to-zoom */
            touch-action: manipulation;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f9f9f9; /* Soft off-white to prevent eye strain */
            color: #222222; /* Charcoal text */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Standard hidden class for state management */
        .hidden {
            display: none !important;
        }

        /* === Layout Containers === */
        .screen {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 900px; /* Widened to accommodate dual column spacing comfortably */
            padding: 20px;
            position: relative;
        }

        #home-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow-y: auto;
        }

        /* Responsive Flex Wrapper for Layout Columns */
        .menu-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 48px; /* Distinct visual partition separating column profiles */
            width: 100%;
        }

        /* Structural Design Columns */
        .menu-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 380px;
        }

        /* Menu Rows for Buttons and Scores */
        .level-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
            width: 100%;
        }

        #game-screen {
            justify-content: space-between;
        }

        /* === Score Displays & Navigation Buttons === */
        .level-score {
            font-size: 2rem;
            font-weight: bold;
            color: #4CAF50;
            width: 90px;
            text-align: left;
            user-select: none;
        }

        #reset-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #ffffff; 
            color: #222222;
            border: 2px solid #222222;
            padding: 10px 16px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #reset-btn:active {
            background-color: #e0e0e0;
        }

        /* Advanced Mode Toggle - Exactly matching reset button style specs */
        #expand-btn {
            position: absolute;
            top: 75px; 
            right: 20px;
            background-color: #ffffff;
            color: #222222;
            border: 2px solid #222222;
            padding: 10px 16px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 76px; /* Strict horizontal blueprint match */
            text-align: center;
        }

        #expand-btn:active {
            background-color: #e0e0e0;
        }

        #home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #555555;
            color: white;
            border: 2px solid #222222;
            padding: 10px 20px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #home-btn:active {
            background-color: #333333;
        }

        /* === Top: Progress Indicator === */
        #progress-indicator {
            font-size: 1.5rem;
            text-align: center;
            padding: 20px 0;
            color: #555;
            font-weight: normal;
        }

        /* === Middle: Listen Button & Display Text === */
        #middle-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px; 
        }

        .listen-btn {
            background: #ffffff;
            border: 3px solid #222222;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .listen-btn:active {
            background: #eeeeee;
        }

        .listen-btn svg {
            width: 50px;
            height: 50px;
            fill: #222222;
        }

        #display-text {
            font-size: 4rem; /* Huge text for readability */
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
            width: 100%;
        }

        /* === Bottom: Option Buttons === */
        #options-area {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 44px; /* Strict 44px minimum spacing for iPad targets */
            width: 100%;
        }

        .action-btn {
            font-size: 2.5rem;
            font-weight: bold;
            padding: 24px 48px;
            min-width: 180px;
            min-height: 88px; /* Massive tap target */
            border: 3px solid #222222;
            background-color: #ffffff;
            color: #222222;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .action-btn:active {
            background-color: #e0e0e0;
            transform: translateY(2px);
        }

        .level-btn:disabled {
            background-color: #dddddd;
            color: #888888;
            border-color: #aaaaaa;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* === Custom Keyboard Input Layout for Level 7 === */
        .keyboard-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            padding: 10px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            width: 100%;
        }

        .key-btn {
            font-size: 1.8rem;
            font-weight: bold;
            height: 64px;
            flex: 1;
            min-width: 32px;
            border: 3px solid #222222;
            background-color: #ffffff;
            color: #222222;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: lowercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            touch-action: manipulation;
        }

        .key-btn:active {
            background-color: #e0e0e0;
            transform: translateY(2px);
        }

        .key-btn.wide-key {
            flex: 1.6;
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        /* === iPad Safe Area Portrait Padding === */
        @media (orientation: portrait) {
            #options-area {
                padding-bottom: max(60px, env(safe-area-inset-bottom, 60px));
            }
        }

        /* === Landscape Layout Optimizations === */
        @media (orientation: landscape) {
            .screen {
                padding: 10px 20px;
            }

            .listen-btn {
                width: 72px;
                height: 72px;
            }
            
            .listen-btn svg {
                width: 36px;
                height: 36px;
            }

            #middle-area {
                gap: 20px;
            }

            #display-text {
                font-size: 3rem;
            }

            #progress-indicator {
                font-size: 1.2rem;
                padding: 8px 0;
                padding-left: 90px;
            }

            .action-btn {
                font-size: 2.2rem;
                padding: 18px 40px;
                min-height: 72px;
            }

            #options-area {
                gap: 28px;
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }

            .key-btn {
                height: 48px;
                font-size: 1.4rem;
                border-radius: 8px;
                border-width: 2px;
            }
            .key-btn.wide-key {
                font-size: 1.1rem;
            }
            .keyboard-container {
                gap: 5px;
                padding: 2px;
            }
            .keyboard-row {
                gap: 4px;
            }
        }
    </style>
</head>

        function _pickVoice() {
            const list = window.speechSynthesis.getVoices();
            if (!list.length) return; 

            _voice =
                list.find(v => v.name === 'Samantha')                        
                || list.find(v => v.name === 'Karen')                        
                || list.find(v => v.lang === 'en-US' && v.localService)     
                || list.find(v => v.lang.startsWith('en') && v.localService)
                || list.find(v => v.lang.startsWith('en'))                   
                || list[0];                                                   
        }

        _pickVoice();
        window.speechSynthesis.onvoiceschanged = _pickVoice;

        function speak(text, callback) {
            if (window.speechSynthesis.paused) {
                window.speechSynthesis.resume();
            }
            window.speechSynthesis.cancel();

            setTimeout(() => {
                activeUtterance = new SpeechSynthesisUtterance(text);
                activeUtterance.lang   = 'en-US';
                activeUtterance.rate   = 0.70; 
                activeUtterance.pitch  = 1.0;
                activeUtterance.volume = 1.0;

                if (_voice) activeUtterance.voice = _voice;

                if (callback) {
                    activeUtterance.onend = () => {
                        callback();
                    };
                }

                window.speechSynthesis.speak(activeUtterance);
            }, 50);
        }

                    } else {
                        visualStr += "_ ";
                    }
                }
            } else {
                // Strict Mode open buffer formatting
                for (let i = 0; i < word.length; i++) {
                    if (i < strictTypedWord.length) {
                        visualStr += strictTypedWord[i] + " ";
                    } else {
                        visualStr += "_ ";
                    }
                }
            }

            const submodeText = currentQuestionIndex < 5 ? "Guided Mode" : "Strict Mode";
            const submodeColor = currentQuestionIndex < 5 ? "#4CAF50" : "#E53935";

            displayText.innerHTML = `
                <div style="font-size: 1.1rem; font-weight: bold; color: ${submodeColor}; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 2px;">${submodeText}</div>
                <div style="font-size: 2.2rem; font-weight: normal; margin-bottom: 12px; color: #555555;">${currentQ.display}</div>
                <div style="font-size: 4.5rem; font-weight: bold; color: #222222; letter-spacing: 12px; text-transform: lowercase;">${visualStr.trim()}</div>
            `;
        }

        // Logic processing matrix for Level 7 letter sequence inputs
        function handleKeyboardKey(key) {
            if (isWaiting) return;
            const currentQ = shuffledQuestions[currentQuestionIndex];
            const targetWord = currentQ.correct;

            if (currentQuestionIndex < 5) {
                // --- SUBMODE 1: GUIDED MATRIX ---
                if (key === 'DELETE' || key === 'ENTER') return; // Blocks non-typing key functionality natively
                
                const expectedLetter = targetWord[currentSpellingIndex];
                if (key === expectedLetter) {
                    currentSpellingIndex++;
                    speak(key);
                    renderKeyboardDisplay();

                    if (currentSpellingIndex === targetWord.length) {
                        isWaiting = true;
                        if (isFirstTryForQuestion) {
                            currentLevelScore++;
                        }
                        speak("Correct! " + targetWord, advanceGame);
                    }
                } else {
                    isFirstTryForQuestion = false;
                    speak(key); // Acoustic character name feedback on rejected keystroke
                }
            } else {
                // --- SUBMODE 2: STRICT MATRIX ---
                if (key === 'DELETE') {
                    if (strictTypedWord.length > 0) {
                        strictTypedWord = strictTypedWord.slice(0, -1);
                        speak("delete");
                        renderKeyboardDisplay();
                    }
                } else if (key === 'ENTER') {
                    if (strictTypedWord.toLowerCase() === targetWord.toLowerCase()) {
                        isWaiting = true;
                        if (isFirstTryForQuestion) {
                            currentLevelScore++;
                        }
                        speak("Correct! " + targetWord, advanceGame);
                    } else {
                        isFirstTryForQuestion = false;
                        speak("Try again");
                    }
                } else {
                    if (strictTypedWord.length < targetWord.length) {
                        strictTypedWord += key;
                        speak(key);
                        renderKeyboardDisplay();
                    }
                }
            }
        }

        // Logic processing matrix for Level 6 letter sequence taps
        function handleLetterTap(selectedLetter, buttonElement) {
            if (isWaiting) return;
            const currentQ = shuffledQuestions[currentQuestionIndex];
            const targetWord = currentQ.correct;
            const expectedLetter = targetWord[currentSpellingIndex];

            if (selectedLetter === expectedLetter) {
                currentSpellingIndex++;
                speak(selectedLetter);
                
                // Vanish tile node cleanly upon accurate sequencing alignment
                buttonElement.style.visibility = 'hidden';
                renderSpellingDisplay();

                if (currentSpellingIndex === targetWord.length) {
                    isWaiting = true;
                    if (isFirstTryForQuestion) {
                        currentLevelScore++;
                    }
                    speak("Correct! " + targetWord, advanceGame);
                }
            } else {
                isFirstTryForQuestion = false;
                speak(selectedLetter); // Acoustic naming validation on erroneous attempts
            }
        }

        // Standard validation matrix processing for Multi-Choice selections
        function handleChoice(selectedChoice, correctChoice) {
            if (isWaiting) return; 

            if (selectedChoice === correctChoice) {
                isWaiting = true;
                
                if (isFirstTryForQuestion) {
                    currentLevelScore++;
                }

                speak("Correct!", advanceGame);
            } else {
                isFirstTryForQuestion = false; 
                speak(selectedChoice);
            }
        }

        function advanceGame() {
            currentQuestionIndex++;

            if (currentQuestionIndex >= shuffledQuestions.length) { 
                completedScores[currentLevelIndex] = currentLevelScore;
                localStorage.setItem('readingGameScores', JSON.stringify(completedScores));
                
                currentQuestionIndex = 0;
                
                updateHomeMenu();
                gameScreen.classList.add('hidden');
                homeScreen.classList.remove('hidden');
                
                speak("Great job! You finished the level.");
                return;
            }
            
            loadQuestion();
        }

        updateHomeMenu();
    </script>
</body>
</html>
