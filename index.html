    <style>
        /* === UI/UX Constraints & iPad Optimizations === */
        * {
            box-sizing: border-box;
            /* Disable text selection and tap highlights so it feels like a native app */
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* Disable double-tap-to-zoom */
            touch-action: manipulation;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f9f9f9; /* Soft off-white to prevent eye strain */
            color: #222222; /* Charcoal text */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Standard hidden class for state management */
        .hidden {
            display: none !important;
        }

        /* === Layout Containers === */
        .screen {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 800px;
            padding: 20px;
        }

        #home-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 24px; /* Generous spacing between level buttons */
            width: 100%;
            max-width: 400px;
        }

        #game-screen {
            justify-content: space-between;
        }

        /* === Top: Progress Indicator === */
        #progress-indicator {
            font-size: 1.5rem;
            text-align: center;
            padding: 20px 0;
            color: #555;
            font-weight: normal;
        }

        /* === Middle: Listen Button & Display Text === */
        #middle-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px; 
        }

        .listen-btn {
            background: #ffffff;
            border: 3px solid #222222;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .listen-btn:active {
            background: #eeeeee;
        }

        .listen-btn svg {
            width: 50px;
            height: 50px;
            fill: #222222;
        }

        #display-text {
            font-size: 4rem; /* Huge text for readability */
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
        }

        /* === Bottom: Option Buttons === */
        #options-area {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 44px; /* Strict 44px minimum spacing for iPad targets */
            padding-bottom: 60px;
        }

        .action-btn {
            font-size: 2.5rem;
            font-weight: bold;
            padding: 24px 48px;
            min-width: 180px;
            min-height: 88px; /* Massive tap target */
            border: 3px solid #222222;
            background-color: #ffffff;
            color: #222222;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .action-btn:active {
            background-color: #e0e0e0;
            transform: translateY(2px);
        }
    </style>
</head>

        const gameScreen = document.getElementById('game-screen');
        const progressIndicator = document.getElementById('progress-indicator');
        const displayText = document.getElementById('display-text');
        const listenBtn = document.getElementById('listen-btn');
        const optionsArea = document.getElementById('options-area');

        // === SHUFFLE HELPER ===
        function shuffleArray(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        // === AUDIO ENGINE ===
        function speak(text) {
            window.speechSynthesis.cancel(); 
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.85; 
            utterance.pitch = 1.0; 

            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => 
                v.name.includes('Premium') || 
                v.name.includes('Enhanced') || 
                v.name.includes('Siri')
            );

            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }

            window.speechSynthesis.speak(utterance);
        }

        // Initialize voices for iOS
        window.speechSynthesis.onvoiceschanged = () => {};

        // === HOMEPAGE EVENT LISTENERS ===
        document.querySelectorAll('.level-btn').forEach(button => {
            button.addEventListener('click', (e) => {
                // Set the level index based on the button's data attribute
                currentLevelIndex = parseInt(e.target.getAttribute('data-level'));
                currentQuestionIndex = 0; // Always start at first question
                
                // Shuffle data immediately upon selection
                let allQuestions = [...gameData[currentLevelIndex].questions];
                shuffledQuestions = shuffleArray(allQuestions).slice(0, 10);

                // Transition screens
                homeScreen.classList.add('hidden');
                gameScreen.classList.remove('hidden');
                
                // Load the first question
                loadQuestion();
            });
        });

        // Re-listen functionality
        listenBtn.addEventListener('click', () => {
            const currentQ = shuffledQuestions[currentQuestionIndex];
            speak(currentQ.audio);
        });

        // === CORE GAME ENGINE ===
        function loadQuestion() {
            isWaiting = false; 
            const currentLevel = gameData[currentLevelIndex];
            const currentQ = shuffledQuestions[currentQuestionIndex];

            // Update UI
            progressIndicator.innerText = `${currentLevel.levelName} - Question ${currentQuestionIndex + 1} / 10`;
            displayText.innerText = currentQ.display;

            // Clear old buttons
            optionsArea.innerHTML = '';

            // Play audio automatically
            speak(currentQ.audio);

            // Randomize choice buttons layout order
            const shuffledChoices = [...currentQ.choices].sort(() => Math.random() - 0.5);

            // Ingest new option elements
            shuffledChoices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'action-btn';
                btn.innerText = choice;
                btn.addEventListener('click', () => handleChoice(choice, currentQ.correct));
                optionsArea.appendChild(btn);
            });
        }

        function handleChoice(selectedChoice, correctChoice) {
            if (isWaiting) return; 

            if (selectedChoice === correctChoice) {
                isWaiting = true;
                speak("Correct!");
                
                setTimeout(() => {
                    advanceGame();
                }, 1500);
            } else {
                speak(selectedChoice);
            }
        }

        function advanceGame() {
            currentQuestionIndex++;

            // Strict boundary: If they finish the 10th question, exit back to homepage
            if (currentQuestionIndex >= 10) { 
                currentQuestionIndex = 0;
                
                // Transition screens back to home
                gameScreen.classList.add('hidden');
                homeScreen.classList.remove('hidden');
                
                // Friendly closing audio cue
                speak("Great job! Choose another level.");
                return;
            }
            
            loadQuestion();
        }
