<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Reading Game</title>
    <style>
        /* === UI/UX Constraints & iPad Optimizations === */
        * {
            box-sizing: border-box;
            /* Disable text selection and tap highlights so it feels like a native app */
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* Disable double-tap-to-zoom */
            touch-action: manipulation;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f9f9f9; /* Soft off-white to prevent eye strain */
            color: #222222; /* Charcoal text */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Standard hidden class for state management */
        .hidden {
            display: none !important;
        }

        /* === Layout Containers === */
        .screen {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 800px;
            padding: 20px;
            position: relative;
        }

        #home-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }

        /* Menu Rows for Buttons and Scores */
        .level-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
            width: 100%;
        }

        #game-screen {
            justify-content: space-between;
        }

        /* === Score Displays & Navigation Buttons === */
        .level-score {
            font-size: 2rem;
            font-weight: bold;
            color: #4CAF50;
            width: 90px;
            text-align: left;
        }

        #reset-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #ff4d4d;
            color: white;
            border: 2px solid #222222;
            padding: 10px 16px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #reset-btn:active {
            background-color: #cc3333;
        }

        #home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #555555;
            color: white;
            border: 2px solid #222222;
            padding: 10px 20px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #home-btn:active {
            background-color: #333333;
        }

        /* === Top: Progress Indicator === */
        #progress-indicator {
            font-size: 1.5rem;
            text-align: center;
            padding: 20px 0;
            color: #555;
            font-weight: normal;
        }

        /* === Middle: Listen Button & Display Text === */
        #middle-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px; 
        }

        .listen-btn {
            background: #ffffff;
            border: 3px solid #222222;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .listen-btn:active {
            background: #eeeeee;
        }

        .listen-btn svg {
            width: 50px;
            height: 50px;
            fill: #222222;
        }

        #display-text {
            font-size: 4rem; /* Huge text for readability */
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
        }

        /* === Bottom: Option Buttons === */
        #options-area {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 44px; /* Strict 44px minimum spacing for iPad targets */
            padding-bottom: 60px;
        }

        .action-btn {
            font-size: 2.5rem;
            font-weight: bold;
            padding: 24px 48px;
            min-width: 180px;
            min-height: 88px; /* Massive tap target */
            border: 3px solid #222222;
            background-color: #ffffff;
            color: #222222;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .action-btn:active {
            background-color: #e0e0e0;
            transform: translateY(2px);
        }

        /* Disabled configuration for finished locked levels */
        .level-btn:disabled {
            background-color: #dddddd;
            color: #888888;
            border-color: #aaaaaa;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
    </style>
</head>

        // === STATE MANAGEMENT ===
        let currentLevelIndex = 0;
        let currentQuestionIndex = 0;
        let shuffledQuestions = []; 
        let isWaiting = false; 
        
        // Score trackers
        let currentLevelScore = 0;
        let isFirstTryForQuestion = true;
        let completedScores = JSON.parse(localStorage.getItem('readingGameScores')) || { 0: null, 1: null, 2: null, 3: null };

        // === DOM ELEMENTS ===
        const homeScreen = document.getElementById('home-screen');
        const gameScreen = document.getElementById('game-screen');
        const progressIndicator = document.getElementById('progress-indicator');
        const displayText = document.getElementById('display-text');
        const listenBtn = document.getElementById('listen-btn');
        const optionsArea = document.getElementById('options-area');
        const homeBtn = document.getElementById('home-btn');
        const resetBtn = document.getElementById('reset-btn');

        // === SHUFFLE HELPER ===
        function shuffleArray(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        // === UI UPDATER FOR HOME MENU ===
        function updateHomeMenu() {
            for (let i = 0; i < 4; i++) {
                const scoreSpan = document.getElementById(`score-${i}`);
                const btn = document.querySelector(`.level-btn[data-level="${i}"]`);
                const savedScore = completedScores[i];

                if (savedScore !== null) {
                    scoreSpan.textContent = `${savedScore}/10`;
                    btn.disabled = true; // Lock level out
                } else {
                    scoreSpan.textContent = '';
                    btn.disabled = false; // Keep it unlocked
                }
            }
        }

        // === AUDIO ENGINE ===
        function speak(text) {
            window.speechSynthesis.cancel(); 
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.85; 
            utterance.pitch = 1.0; 

            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => 
                v.name.includes('Premium') || 
                v.name.includes('Enhanced') || 
                v.name.includes('Siri')
            );

            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }

            window.speechSynthesis.speak(utterance);
        }

        // Initialize voices on system load
        window.speechSynthesis.onvoiceschanged = () => {};

        // === APP NAVIGATION ACTIONS ===
        document.querySelectorAll('.level-btn').forEach(button => {
            button.addEventListener('click', (e) => {
                currentLevelIndex = parseInt(e.target.getAttribute('data-level'));
                currentQuestionIndex = 0; 
                currentLevelScore = 0; // Fresh score tracking loop
                
                // Shuffle immediately upon click
                let allQuestions = [...gameData[currentLevelIndex].questions];
                shuffledQuestions = shuffleArray(allQuestions).slice(0, 10);

                // UI Screen flip
                homeScreen.classList.add('hidden');
                gameScreen.classList.remove('hidden');
                
                loadQuestion();
            });
        });

        // In-game Home button logic
        homeBtn.addEventListener('click', () => {
            window.speechSynthesis.cancel();
            gameScreen.classList.add('hidden');
            homeScreen.classList.remove('hidden');
        });

        // Global Scores Reset logic
        resetBtn.addEventListener('click', () => {
            completedScores = { 0: null, 1: null, 2: null, 3: null };
            localStorage.removeItem('readingGameScores');
            updateHomeMenu();
            speak("Scores reset.");
        });

        // Re-listen mechanism
        listenBtn.addEventListener('click', () => {
            const currentQ = shuffledQuestions[currentQuestionIndex];
            speak(currentQ.audio);
        });

        // === CORE GAME ENGINE ===
        function loadQuestion() {
            isWaiting = false; 
            isFirstTryForQuestion = true; // Reset try check context
            const currentLevel = gameData[currentLevelIndex];
            const currentQ = shuffledQuestions[currentQuestionIndex];

            // Update Header Display
            progressIndicator.innerText = `${currentLevel.levelName} - Question ${currentQuestionIndex + 1} / 10`;
            displayText.innerText = currentQ.display;

            optionsArea.innerHTML = '';
            speak(currentQ.audio);

            // Shuffling buttons order output dynamically
            const shuffledChoices = [...currentQ.choices].sort(() => Math.random() - 0.5);

            shuffledChoices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'action-btn';
                btn.innerText = choice;
                btn.addEventListener('click', () => handleChoice(choice, currentQ.correct));
                optionsArea.appendChild(btn);
            });
        }

        function handleChoice(selectedChoice, correctChoice) {
            if (isWaiting) return; 

            if (selectedChoice === correctChoice) {
                isWaiting = true;
                
                // Score credit check
                if (isFirstTryForQuestion) {
                    currentLevelScore++;
                }

                speak("Correct!");
                
                setTimeout(() => {
                    advanceGame();
                }, 1500);
            } else {
                isFirstTryForQuestion = false; // Mark error state flag
                speak(selectedChoice);
            }
        }

        function advanceGame() {
            currentQuestionIndex++;

            if (currentQuestionIndex >= 10) { 
                // Store structural records securely
                completedScores[currentLevelIndex] = currentLevelScore;
                localStorage.setItem('readingGameScores', JSON.stringify(completedScores));
                
                // Reset runtime values
                currentQuestionIndex = 0;
                
                // Redraw states and navigate home
                updateHomeMenu();
                gameScreen.classList.add('hidden');
                homeScreen.classList.remove('hidden');
                
                speak("Great job! You finished the level.");
                return;
            }
            
            loadQuestion();
        }

        // Initialize state display configuration on execution startup
        updateHomeMenu();
    </script>
